# alembic.ini — Plan 01-03 Task 3
#
# Per AUTH-03 / T-01-03-04: sqlalchemy.url is intentionally LEFT BLANK so
# the SQLCipher passphrase is never persisted in this config file. The
# real URL is built programmatically by migrations/env.py from the
# active gekko.config.Settings and a GEKKO_DB_PASSPHRASE env var.
#
# The migration engine bootstrap goes through gekko.db.engine.get_async_engine
# so the PRAGMA-key connect-event handler activates (Pitfall 1).

[alembic]
script_location = migrations
prepend_sys_path = . src
sqlalchemy.url =

# Use a timezone-naive UTC ISO 8601 timestamp for new revision filenames.
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40

# version_locations is intentionally NOT set — alembic defaults to
# {script_location}/versions which handles repo paths containing spaces
# correctly. Setting version_locations = %(here)s/migrations/versions
# breaks when %(here)s expands to a path with spaces (alembic splits on
# whitespace).

# Logging configuration — copied from the alembic init -t async template.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
